<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Supreg CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">

    <div class="login-brand">
      <div class="logo-mark">SR</div>
      <div class="logo-label">Supreg CRM</div>
    </div>

    <p style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:1.5rem;">
      Ingresá con tu usuario y contraseña
    </p>

    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <div class="invalid-feedback d-block" style="font-size:12px;color:var(--red);">
          {{ field.errors.0 }}
        </div>
        {% endif %}
      </div>
      {% endfor %}
      {% if form.non_field_errors %}
      <div class="alert alert-danger mb-3">{{ form.non_field_errors.0 }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary w-100 mt-1" style="height:38px;font-size:14px;">
        <i class="bi bi-box-arrow-in-right"></i> Ingresar
      </button>
    </form>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
